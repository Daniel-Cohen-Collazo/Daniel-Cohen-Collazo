<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150" role="img" aria-label="Technical banner">
  <defs>
    <linearGradient id="shineT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a371f7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="150" fill="#0b0b0b" stroke="#2c2c2a"/>
  <rect x="0" y="0" width="8" height="0" fill="#8957e5">
    <animate attributeName="height" from="0" to="150" dur="0.8s" fill="freeze"/>
  </rect>
  <rect width="300" height="150" fill="url(#shineT)">
    <animate attributeName="x" from="-300" to="800" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="40" y="60" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">TECHNICAL</text>
  <text x="42" y="90" font-family="Arial, sans-serif" font-size="18" fill="#c3c2b7">Cybersecurity · Information Systems · AI</text>
  <text x="42" y="118" font-family="Arial, sans-serif" font-size="15" fill="#a371f7">LangGraph · OpenAI · RAG · Python</text>
  <text x="760" y="58" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#888">UTSA · Johns Hopkins</text>
</svg>
